name: lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  descriptions:
    name: skill description budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node scripts/lint-descriptions.cjs
